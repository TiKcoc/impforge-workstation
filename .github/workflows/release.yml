name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
            rust_targets: ''
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust_targets: ''
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install system dependencies (Linux)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            protobuf-compiler

      - name: Install protoc (Windows)
        if: contains(matrix.platform, 'windows')
        run: choco install protoc -y

      - name: Install protoc (macOS)
        if: contains(matrix.platform, 'macos')
        run: brew install protobuf

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: impforge-v__VERSION__
          releaseName: 'ImpForge v__VERSION__'
          releaseBody: |
            ## ImpForge - AI Workstation Builder v__VERSION__

            ### Changes
            See [CHANGELOG.md](https://github.com/AiImpDevelopment/impforge-workstation/blob/main/CHANGELOG.md) for full details.

            ### Downloads
            | Platform | Architecture | Format |
            |----------|-------------|--------|
            | Linux | x64 | `.AppImage`, `.deb` |
            | Linux | arm64 | `.AppImage`, `.deb` |
            | Windows | x64 | `.msi`, `.exe` |
            | macOS | Apple Silicon (aarch64) | `.dmg` |
            | macOS | Intel (x86_64) | `.dmg` |

            ### Checksums
            See the attached `checksums.txt` for SHA256 verification.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
